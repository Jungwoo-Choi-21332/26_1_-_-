<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네온 장화홍련: 부서진 장미 (아동학대 대응 잔혹극)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-primary: #fb7185;
            --step-primary: #a855f7;
            --blue-primary: #60a5fa;
            --bg-dark: #020617;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(136, 19, 55, 0.15), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(15, 23, 42, 0.15), transparent 40%);
            background-attachment: fixed;
        }
        
        #game-container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #image-display {
            width: 100%;
            height: 400px;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            overflow: hidden;
            position: relative;
            background: #0f172a;
            border: 1px solid #1e293b;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #image-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1s ease-in-out;
        }

        .img-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(2,6,23,0.9), transparent);
            padding: 2rem 1rem 1rem;
            height: 40%;
        }

        .passage-text {
            font-size: 1.15rem;
            line-height: 2.2;
            margin-bottom: 2.5rem;
            white-space: pre-wrap;
            animation: fadeIn 1s ease-out;
            background: rgba(15, 23, 42, 0.4);
            padding: 2.5rem;
            border-radius: 1.5rem;
            border-left: 6px solid var(--rose-primary);
            backdrop-filter: blur(5px);
        }

        .highlight-rose { color: var(--rose-primary); font-weight: 800; text-shadow: 0 0 10px rgba(251, 113, 133, 0.4); }
        .highlight-step { color: var(--step-primary); font-weight: 800; } 
        .highlight-blue { color: var(--blue-primary); font-weight: 800; }

        .choices-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.2rem;
            margin-bottom: 4rem;
        }

        .choice-btn {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            color: #cbd5e1;
            padding: 1.5rem 2rem;
            text-align: left;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.05rem;
            opacity: 0;
            animation: slideIn 0.5s ease-out forwards;
            line-height: 1.6;
        }

        .choice-btn:hover {
            background-color: #1e293b;
            border-color: var(--rose-primary);
            color: #ffffff;
            transform: translateX(15px);
            box-shadow: -10px 0 30px rgba(251, 113, 133, 0.15);
        }

        .status-bar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 1.2rem;
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 1rem;
            z-index: 100;
        }

        .bar-container { width: 160px; height: 12px; background: #1e293b; border-radius: 6px; overflow: hidden; border: 1px solid #334155; }
        .fill-mental { height: 100%; background: linear-gradient(90deg, #be123c, #fb7185); transition: width 0.7s ease-in-out; }
        .fill-evidence { height: 100%; background: linear-gradient(90deg, #1d4ed8, #60a5fa); transition: width 0.7s ease-in-out; }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(251, 113, 133, 0.1);
            border-top: 4px solid var(--rose-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .log-container {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 2rem;
            padding: 1.5rem;
            border-top: 1px solid #1e293b;
            background: rgba(15, 23, 42, 0.2);
            border-radius: 1rem;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="status-bar">
            <div>
                <p id="target-state" class="text-xs font-black text-rose-500 mb-1 tracking-[0.2em] uppercase">MONITORING</p>
                <p id="chapter-text" class="text-xl font-black text-white leading-none">LOADING SCENARIO...</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-8">
                <div>
                    <div class="flex justify-between mb-1"><span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">심리적 안정도</span><span id="mental-val" class="text-[10px] text-rose-400">100%</span></div>
                    <div class="bar-container"><div id="mental-fill" class="fill-mental" style="width: 100%"></div></div>
                </div>
                <div>
                    <div class="flex justify-between mb-1"><span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">학대 증거 확보</span><span id="evidence-val" class="text-[10px] text-blue-400">0%</span></div>
                    <div class="bar-container"><div id="evidence-fill" class="fill-evidence" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <div id="image-display">
            <div class="loader" id="image-loader" style="display: none;">
                <div class="spinner"></div>
                <p class="text-xs text-rose-400 font-bold animate-pulse">이미지를 불러오는 중...</p>
            </div>
            <img id="scene-image" src="" alt="Scene" style="display: none;">
            <div class="img-overlay"></div>
        </div>

        <div id="display-area"></div>
        <div id="choices-area" class="choices-container"></div>
        
        <div class="log-container" id="game-log">
            <p class="text-rose-500 font-bold mb-2 uppercase text-[10px] tracking-widest">Case Log</p>
            <div id="log-content"></div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const IMAGE_BASE_PATH = "images/";

        const state = {
            mental: 100, 
            evidence: 0,
            chapter: "PROLOGUE",
        };

        function setLocalImage(imageName) {
            const imgElement = document.getElementById('scene-image');
            if (!imageName) {
                imgElement.style.display = 'none';
                return;
            }
            
            imgElement.style.opacity = '0';
            imgElement.src = IMAGE_BASE_PATH + imageName;
            imgElement.style.display = 'block';
            
            imgElement.onload = () => {
                imgElement.style.opacity = '1';
            };
            
            imgElement.onerror = () => {
                console.error("이미지를 찾을 수 없습니다: " + IMAGE_BASE_PATH + imageName);
                imgElement.style.display = 'none';
                addLog(`[Error] 이미지를 불러올 수 없습니다: ${imageName}`);
            };
        }

        const story = {
            "start": {
                chapter: "CHAPTER 1: 감금된 정원",
                imagePath: "1_garden.jpg",
                text: "저택의 높은 담장은 외부와 자매를 완전히 격리시키고 있었다. \n<span class='highlight-rose'>장화</span>는 겁에 질린 동생 <span class='highlight-rose'>홍련</span>을 품에 안았다. \n\n\"홍련아, 괜찮아. 아버지가 돌아오시면 다 말씀드리자. 그럼 우릴 예전처럼 사랑해 주실 거야.\"\n하지만 자매는 알고 있었다. 아버지는 <span class='highlight-step'>계모 허 씨</span>의 교묘한 이간질과 가스라이팅에 눈과 귀가 가려진 지 오래라는 것을.\n\n허 씨는 2층 난간에서 자매를 내려다보며 차갑게 읊조렸다.\n\"어딜 감히 밖을 내다보느냐? 너희 같은 천덕꾸러기들은 이 안에서 죽은 듯이 지내는 게 가문을 돕는 길이다.\"",
                choices: [
                    { 
                        text: "\"언니, 배고파... 어제부터 아무것도 못 먹었어.\"", 
                        to: "starvation_scene",
                        on: () => { state.mental -= 10; addLog("신체적 학대(방임)가 기록되었습니다."); }
                    },
                    { 
                        text: "\"언니, 우리 도망치면 안 돼? 여기 있으면 정말 죽을 것 같아.\"", 
                        to: "escape_attempt",
                        on: () => { state.evidence += 5; addLog("탈출 의지를 다집니다."); }
                    }
                ]
            },

            "starvation_scene": {
                imagePath: "2_kitchen.jpg",
                text: "부엌에는 남은 밥풀 하나조차 보이지 않았다. 허 씨는 하인들에게 자매에게 음식을 주지 말라고 엄명을 내린 상태였다.\n\n\"어머니, 제발 동생만이라도...\"\n장화가 허 씨의 방 앞에서 무릎을 꿇고 애원했지만, 돌아온 것은 무자비한 매질뿐이었다.\n\"천한 것, 어디서 구걸질이냐! 아버지가 안 계실 때 네 본성이 드러나는구나!\"\n\n장화는 온몸에 멍이 든 채 방으로 돌아왔다. 홍련은 언니의 상처를 보며 소리 없이 오열했다.",
                on: () => { state.mental -= 20; },
                choices: [
                    { text: "장화의 상처를 수건으로 닦아준다.", to: "comfort_sister" },
                    { text: "허 씨의 방에 몰래 들어가 증거가 될 만한 것을 찾는다.", to: "search_evidence" }
                ]
            },

            "comfort_sister": {
                imagePath: "comfort.jpg",
                text: "장화는 아픈 몸을 이끌고 오히려 동생을 다독였다. \n\"울지 마, 홍련아. 이럴 때일수록 우리가 정신을 똑바로 차려야 해.\"\n두 자매는 서로의 온기를 나누며 기나긴 밤을 버텼다. \n\n하지만 밤이 깊어지자 지하실 쪽에서 수상한 소음이 들려오기 시작했다.",
                choices: [{ text: "소리가 나는 곳으로 향한다.", to: "basement_isolation" }]
            },

            "search_evidence": {
                imagePath: "6_recorder.jpg",
                text: "장화는 계모가 잠든 틈을 타 방 근처를 수색했다. \n그곳에서 계모가 아버지에게 보낸 거짓 편지들과 자매를 내쫓으려는 계획서 일부를 발견했다.\n\"이걸 아버지가 보신다면...!\"\n하지만 증거를 챙기려는 순간, 계모의 방 문이 열리는 소리가 들렸다.",
                on: () => { state.evidence += 15; addLog("중요한 서류 증거를 확보했습니다."); },
                choices: [
                    { text: "급히 몸을 숨긴다.", to: "escape_attempt" },
                    { text: "들키기 전에 지하실로 숨어든다.", to: "basement_isolation" }
                ]
            },

            "escape_attempt": {
                imagePath: "3_wall.jpg",
                text: "홍련은 밤을 틈타 담장을 넘으려 했다. 하지만 허 씨가 설치해둔 가시 덩굴과 방범 시설에 걸려 넘어져 크게 다치고 말았다.\n\n\"이년이 감히 가출을 시도해?\"\n허 씨는 홍련을 머리채를 잡아 끌고 지하실로 던져버렸다. \n\"네 아버지가 돌아오시면 네가 정신이 나가서 스스로 다친 거라고 말해주마. 누가 내 말을 믿겠느냐, 아니면 미친 년의 말을 믿겠느냐?\"",
                on: () => { state.mental -= 30; state.evidence += 10; },
                choices: [{ text: "지하실의 어둠 속에서 흐느낀다.", to: "basement_isolation" }]
            },

            "basement_isolation": {
                imagePath: "4_basement.jpg",
                text: "지하실의 공기는 차갑고 습했다. 장화는 문 밖에서 울부짖었지만, 문은 굳게 잠겨 있었다.\n홍련은 점점 정신이 아득해졌다. 계모의 끊임없는 폭언과 육체적 고통이 그녀를 갉아먹고 있었다.\n\n\"홍련아, 정신 차려! 내가 꼭 구해줄게!\"\n언니의 목소리가 멀게만 느껴지던 그때, 지하실의 작은 환기구 너머로 누군가의 시선이 느껴졌다.",
                on: () => { state.chapter = "CHAPTER 2: 구원의 손길"; },
                choices: [{ text: "환기구 쪽을 바라본다.", to: "meet_agency_chief" }]
            },

            "meet_agency_chief": {
                imagePath: "5_chief.jpg",
                text: "\"쉿, 조용히 하세요. 아동학대대응센터에서 나왔습니다.\"\n등불 대신 현대적인 손전등을 든 사내, <span class='highlight-blue'>정 실장</span>이었다. \n그는 익명의 제보(자매를 안타깝게 여긴 하인)를 받고 잠입 조사를 벌이던 중이었다.\n\n\"장화 아가씨는 저희 요원들이 보호하고 있습니다. 이제 홍련 아가씨 차례입니다. 하지만 법적으로 저 여자를 처벌하려면 확실한 학대 증거가 필요합니다. 견딜 수 있겠습니까?\"",
                choices: [
                    { 
                        text: "\"네, 저 여자가 우리에게 한 일을 모두 증언할게요.\"", 
                        to: "investigation_cooperate",
                        on: () => { state.evidence += 40; addLog("전문가의 도움으로 증거 수집을 시작합니다."); }
                    },
                    { 
                        text: "\"무서워요... 그냥 여기서 저를 꺼내주세요.\"", 
                        to: "immediate_rescue",
                        on: () => { state.mental += 20; addLog("긴급 분리 조치를 요청합니다."); }
                    }
                ]
            },

            // 누락되었던 노드 추가: 긴급 구조 루트
            "immediate_rescue": {
                imagePath: "rescue_safe.jpg",
                text: "정 실장은 홍련을 조심스럽게 환기구를 통해 밖으로 끌어올렸다.\n\"걱정 마세요. 이제 안전합니다. 즉시 임시 보호소로 이송하겠습니다.\"\n홍련은 먼저 구조되어 있던 장화와 눈물의 재회를 했다.\n\n하지만 정 실장의 표정은 어두웠다. \"증거가 부족하면 그 여자는 가벼운 벌금형으로 풀려날지도 모릅니다. 정말 이대로 끝내시겠습니까?\"",
                choices: [
                    { text: "다시 용기를 내어 증거 수집에 협조한다.", to: "investigation_cooperate" },
                    { text: "그냥 멀리 도망가고 싶어요.", to: "ending_resolver" }
                ]
            },

            "investigation_cooperate": {
                imagePath: "6_recorder.jpg",
                text: "정 실장은 홍련에게 작은 녹음기와 초소형 카메라를 건넸다. \n\"저 여자가 폭언을 퍼부을 때, 그리고 폭력을 행사할 때 이것을 켜십시오. 우리는 밖에서 실시간으로 모니터링하며 결정적인 순간에 들이닥칠 겁니다.\"\n\n홍련은 다시 지옥 같은 일상으로 돌아갔다. 허 씨는 홍련이 유순해진 줄 알고 더욱 악독하게 굴었다. \n\"네 언니는 이제 죽었어! 내가 산에 버렸단 말이다! 너도 곧 그렇게 될 거야!\"\n그 모든 폭언이 정 실장의 단말기에 실시간으로 기록되고 있었다.",
                on: () => { state.evidence += 30; state.chapter = "CHAPTER 3: 심판의 시간"; },
                choices: [{ text: "결정적인 폭력의 순간을 기다린다.", to: "final_confrontation" }]
            },

            "final_confrontation": {
                imagePath: "7_arrest.jpg",
                text: "허 씨가 홍련을 향해 몽둥이를 치켜든 순간, 저택의 대문이 부서지며 경찰과 아동보호전문기관 요원들이 들이닥쳤다.\n\n\"허 씨, 당신을 아동복지법 위반 및 중감금, 상해 혐의로 긴급 체포합니다!\"\n정 실장이 앞장서서 체포영장을 제시했다. 허 씨는 비명을 지르며 발악했다. \n\"이게 무슨 짓이야! 내 집에서 내 자식들을 훈육하는 게 무슨 죄라고!\"\n\n하지만 이미 확보된 수많은 영상과 녹취록 앞에서 그녀의 변명은 무력했다.",
                choices: [{ text: "사건의 결말을 확인한다.", to: "ending_resolver" }]
            },

            "ending_resolver": {
                text: "수사관들이 모든 자료를 검토했습니다. 자매의 운명이 결정됩니다.",
                choices: [
                    { text: "결과 확인 (증거 충분)", to: "true_ending", cond: () => state.evidence >= 70 },
                    { text: "결과 확인 (증거 불충분)", to: "bad_ending", cond: () => state.evidence < 70 }
                ]
            },

            "true_ending": {
                imagePath: "8_happy.jpg",
                text: "허 씨는 법정 최고형을 선고받고 격리되었다. 무관심했던 아버지 역시 방임 죄로 부모권을 박탈당했다.\n장화와 홍련은 정 실장의 도움으로 전문 심리 치료를 받으며 평범한 일상을 되찾았다. \n\n이제 자매는 더 이상 밤마다 문 잠그는 소리에 떨지 않는다. \n햇살 아래서 서로의 손을 꼭 잡은 두 송이 꽃은 비로소 안전하게 피어났다.\n<span class='highlight-blue'>[TRUE ENDING: 국가가 보호하는 장미]</span>",
                choices: [{ text: "다시 시작하기", to: "start", on: () => reset() }]
            },

            "bad_ending": {
                imagePath: "9_sad.jpg",
                text: "허 씨는 처벌받았지만, 증거 부족으로 집행유예로 풀려났다. \n무관심했던 아버지는 여전히 자매를 탓하며 방관했다. \n홍련은 심각한 외상 후 스트레스 장애로 인해 대인기피증과 환각에 시달리게 되었다. \n상처는 아물어도 흉터는 영원히 남는 법이다.\n<span class='highlight-rose'>[BAD ENDING: 상처뿐인 승리]</span>",
                choices: [{ text: "다시 시작하기", to: "start", on: () => reset() }]
            }
        };

        function addLog(msg) {
            const content = document.getElementById('log-content');
            const p = document.createElement('p');
            p.className = "mb-1 border-l-2 border-slate-700 pl-2 py-1";
            p.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            content.prepend(p);
        }

        function updateUI() {
            document.getElementById('mental-fill').style.width = `${Math.max(0, state.mental)}%`;
            document.getElementById('evidence-fill').style.width = `${Math.min(100, state.evidence)}%`;
            document.getElementById('mental-val').innerText = `${Math.max(0, state.mental)}%`;
            document.getElementById('evidence-val').innerText = `${state.evidence}%`;
            document.getElementById('chapter-text').innerText = state.chapter;
            
            const targetState = document.getElementById('target-state');
            if(state.mental > 60) {
                targetState.innerText = "STATUS: MONITORING";
                targetState.className = "text-xs font-black text-green-500 mb-1 tracking-[0.2em]";
            } else {
                targetState.innerText = "STATUS: CRITICAL";
                targetState.className = "text-xs font-black text-rose-600 mb-1 tracking-[0.2em]";
            }
        }

        async function render(nodeId) {
            const node = story[nodeId];
            if(!node) {
                console.error("다음 노드를 찾을 수 없습니다: " + nodeId);
                addLog(`[System Error] '${nodeId}' 노드가 정의되지 않았습니다.`);
                return;
            }
            if(node.on) node.on();
            updateUI();

            document.getElementById('display-area').innerHTML = `<div class="passage-text">${node.text}</div>`;
            const choices = document.getElementById('choices-area');
            choices.innerHTML = '';
            
            if(node.imagePath) setLocalImage(node.imagePath);

            node.choices.forEach((c, idx) => {
                if(c.cond && !c.cond()) return;
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = c.text;
                btn.style.animationDelay = `${idx * 0.2}s`;
                btn.onclick = () => render(c.to);
                choices.appendChild(btn);
            });
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function reset() {
            state.mental = 100;
            state.evidence = 0;
            state.chapter = "CHAPTER 1";
            addLog("사건 데이터가 초기화되었습니다.");
        }

        window.onload = () => render('start');
    </script>
</body>
</html>
